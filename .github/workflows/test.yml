name: Test

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.game }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - game: tuppi
            needs_install: false
          - game: sanaseppa
            needs_install: false
          - game: sanapalat
            needs_install: false
          - game: sanasato
            needs_install: false
          - game: rypas
            needs_install: false
          - game: holdem
            needs_install: false
          - game: mylly
            needs_install: false
          - game: tammi
            needs_install: false
          - game: mosaiikki
            needs_install: false
          - game: palikat
            needs_install: false
          - game: labyrintti
            needs_install: false
          - game: moottori-mania
            needs_install: false
          - game: katko
            needs_install: false
          - game: kapysota
            needs_install: false
          - game: romuralli
            needs_install: false
          - game: kolmitaso
            needs_install: false
    defaults:
      run:
        working-directory: ${{ matrix.game }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install dependencies
        if: matrix.needs_install
        run: npm ci

      - name: Test
        run: npm test

  build-hertta:
    name: hertta (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hertta
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: hertta/package-lock.json

      - run: npm ci
      - run: npm run build
