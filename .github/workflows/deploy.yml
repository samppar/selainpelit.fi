name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: ${{ matrix.game }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        game: [tuppi, sanaseppa, sanapalat, sanasato, rypas, holdem, mylly, tammi, mosaiikki, palikat, labyrintti, moottori-mania, katko, kapysota, romuralli, sladi]
    defaults:
      run:
        working-directory: ${{ matrix.game }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: npm test

  deploy:
    name: Build & rsync
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: hertta/package-lock.json

      - name: Build games
        run: |
          set -euo pipefail

          # Hertta (Vite → dist/, base /hertta/)
          (cd hertta && npm ci && npm run build)

          # Itsenäiset HTML-niput
          (cd tuppi && node build.js)
          (cd sanaseppa && node build.js)
          (cd sanapalat && node build.js)
          (cd sanasato && node build.js)
          (cd rypas && node build.js)
          (cd holdem && node build.js)
          (cd mylly && node build.js)
          (cd tammi && node build.js)
          (cd mosaiikki && node build.js)
          (cd palikat && node build.js)
          (cd labyrintti && node build.js)
          (cd katko && node build.js)
          (cd kapysota && node build.js)
          (cd romuralli && node build.js)
          (cd sladi && node build.js)
          # moottori-mania: ei build.js:ää, index.html on itsenäinen ja jo valmis

          mkdir -p _site/hertta _site/tuppi _site/sanaseppa _site/sanapalat _site/sanasato _site/rypas _site/holdem _site/mylly _site/tammi _site/mosaiikki _site/palikat _site/labyrintti _site/moottori-mania _site/katko _site/kapysota _site/romuralli _site/sladi

          cp -R hertta/dist/. _site/hertta/
          cp tuppi/tuppi.html _site/tuppi/index.html
          cp sanaseppa/index.html _site/sanaseppa/index.html
          cp sanapalat/index.html _site/sanapalat/index.html
          cp sanasato/index.html _site/sanasato/index.html
          cp rypas/index.html _site/rypas/index.html
          cp holdem/index.html _site/holdem/index.html
          cp mylly/index.html _site/mylly/index.html
          cp tammi/index.html _site/tammi/index.html
          cp mosaiikki/index.html _site/mosaiikki/index.html
          cp palikat/index.html _site/palikat/index.html
          cp labyrintti/index.html _site/labyrintti/index.html
          cp moottori-mania/index.html _site/moottori-mania/index.html
          cp katko/dist/index.html _site/katko/index.html
          cp kapysota/index.html _site/kapysota/index.html
          cp romuralli/index.html _site/romuralli/index.html
          cp sladi/index.html _site/sladi/index.html

          # Etusivu = repossa ylläpidetty home/index.html
          cp home/index.html _site/index.html

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          HOST="${DEPLOY_HOST:-viikkokisat.fi}"
          PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      # Tuotanto = Cloudflare-origin (viikkokisat.fi).
      # Secrets:
      #   DEPLOY_HOST=viikkokisat.fi
      #   DEPLOY_USER=selainpelit
      #   DEPLOY_PATH=/var/www/selainpelit.fi/prod/public
      #   DEPLOY_SSH_KEY=<~/.ssh/selainpelit_ed25519>
      #   DEPLOY_PORT=22 (valinnainen)
      - name: Rsync to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          HOST="${DEPLOY_HOST:-viikkokisat.fi}"
          USERNAME="${DEPLOY_USER:-root}"
          DEST="${DEPLOY_PATH:-/var/www/selainpelit.fi/prod/public}"
          PORT="${DEPLOY_PORT:-22}"
          rsync -az \
            -e "ssh -p $PORT -o StrictHostKeyChecking=yes" \
            ./_site/ \
            "${USERNAME}@${HOST}:${DEST}/"
