<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Elasto-Mania (kunnianosoitus, aito fysiikka)</title>
<style>
  :root{
    --sky1:#8fd0e8; --sky2:#dff2e6;
    --ground:#3a2a1c; --grass:#3f8f3a;
    --ink:#1c1a17; --paper:#f5efe2; --accent:#c8401e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink);font-family:"Courier New",monospace;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #wrap{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}
  #levBtn{position:fixed;top:52px;right:12px;color:var(--ink);font-weight:bold;font-size:13px;
    background:var(--paper);border:2px solid var(--ink);padding:6px 10px;cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,.35);font-family:"Courier New",monospace}
  #levBtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.35)}
  #demoBtn{position:fixed;top:136px;right:12px;color:var(--ink);font-weight:bold;font-size:13px;
    background:var(--paper);border:2px solid var(--ink);padding:6px 10px;cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,.35);font-family:"Courier New",monospace}
  #demoBtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.35)}
  #demoBadge{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:none;
    background:var(--accent);color:#fff;font-family:"Courier New",monospace;font-weight:bold;
    padding:6px 14px;border:2px solid var(--ink);box-shadow:3px 3px 0 rgba(0,0,0,.35);font-size:13px;z-index:30}
  #demoBadge.on{display:block}
  #menuBtn{position:fixed;top:94px;right:12px;color:var(--ink);font-weight:bold;font-size:13px;
    background:var(--paper);border:2px solid var(--ink);padding:6px 10px;cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,.35);font-family:"Courier New",monospace}
  #menuBtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.35)}
  #lvlMenu{position:fixed;inset:0;background:rgba(20,16,10,.55);display:none;
    align-items:center;justify-content:center;z-index:40}
  #lvlMenu.open{display:flex}
  #lvlCard{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 rgba(0,0,0,.4);
    padding:22px 28px;font-family:"Courier New",monospace;color:var(--ink);min-width:300px}
  #lvlCard h2{margin:0 0 12px;font-size:18px;letter-spacing:1px}
  .lvlRow{display:flex;justify-content:space-between;gap:18px;padding:7px 10px;margin:4px 0;
    border:2px solid var(--ink);cursor:pointer;background:#fff8ea;font-size:14px}
  .lvlRow:hover{background:var(--ink);color:var(--paper)}
  .lvlRow .bt{opacity:.75;font-size:12px;align-self:center}
  #lvlCard .hint{margin-top:10px;font-size:11px;opacity:.7}
  #skinBtn{position:fixed;top:10px;right:12px;color:var(--ink);font-weight:bold;font-size:13px;
    background:var(--paper);border:2px solid var(--ink);padding:6px 10px;cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,.35);font-family:"Courier New",monospace}
  #skinBtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.35)}
  #hud{position:fixed;top:10px;left:12px;color:var(--ink);font-weight:bold;font-size:15px;
    background:var(--paper);border:2px solid var(--ink);padding:6px 10px;line-height:1.5;
    box-shadow:3px 3px 0 rgba(0,0,0,.35)}
  #msg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  #msg .card{background:var(--paper);border:3px solid var(--ink);padding:22px 28px;text-align:center;
    color:var(--ink);box-shadow:5px 5px 0 rgba(0,0,0,.4);max-width:90vw}
  #msg h1{font-size:26px;letter-spacing:2px;margin-bottom:8px}
  #msg p{font-size:14px;line-height:1.6}
  #msg .go{color:var(--accent);font-weight:bold;margin-top:10px;display:block}
  .hidden{display:none!important}
  #touch{position:fixed;bottom:12px;left:0;right:0;display:flex;justify-content:space-between;
    padding:0 14px;pointer-events:none}
  .tgroup{display:flex;gap:10px;pointer-events:auto}
  .tbtn{width:64px;height:64px;border:2px solid var(--ink);background:rgba(245,239,226,.85);
    color:var(--ink);font-size:22px;font-weight:bold;border-radius:10px;
    display:flex;align-items:center;justify-content:center;box-shadow:3px 3px 0 rgba(0,0,0,.35)}
  .tbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.35)}
  @media (hover:hover) and (pointer:fine){ #touch{display:none} }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="hud"></div>
<div id="skinBtn" title="Vaihda ulkoasu (S)"></div>
<div id="levBtn" title="Lataa .lev-kenttä">+ LEV</div>

<div id="menuBtn" title="Valitse kenttä (K)">KENTÄT</div>
<div id="demoBtn" title="Tietokone näyttää mallin (M)">MALLI</div>
<div id="demoBadge">MALLISUORITUS &#9654; mikä tahansa näppäin keskeyttää</div>
<div id="lvlMenu"><div id="lvlCard">
  <h2>VALITSE KENTTÄ</h2>
  <div id="lvlList"></div>
  <div class="hint">numero tai klikkaus valitsee &middot; K/Esc sulkee</div>

<div id="msg"><div class="card" id="msgCard"></div></div>
<div id="touch">
  <div class="tgroup">
    <div class="tbtn" data-k="ArrowLeft">&#8634;</div>
    <div class="tbtn" data-k="ArrowRight">&#8635;</div>
  </div>
  <div class="tgroup">

/* ---------- talppontkereses ---------- */
function findContacts(px,py,rad,polys){
  const cands=[];
  for(const poly of polys){
    for(let i=0;i<poly.length;i++){
      const a=poly[i], b=poly[(i+1)%poly.length];
      const abx=b[0]-a[0], aby=b[1]-a[1];
      const t=Math.max(0,Math.min(1,((px-a[0])*abx+(py-a[1])*aby)/(abx*abx+aby*aby||1e-12)));
      const cx=a[0]+abx*t, cy=a[1]+aby*t;
      const d=Math.hypot(px-cx,py-cy);
      if(d<rad) cands.push({x:cx,y:cy,d});
    }
  }
  cands.sort((p,q)=>p.d-q.d);
  const out=[];
  for(const c of cands){
    if(out.every(o=>Math.hypot(o.x-c.x,o.y-c.y)>MERGE_D)) out.push(c);
    if(out.length===2) break;
  }
  return out;
}

/* ---------- beallit (BEALLIT.CPP) ---------- */
function beallit(k, Fx, Fy, M, mass, theta, isWheel, polys, setContact){
  let pts = isWheel ? findContacts(k.x,k.y,WHEEL_RAD,polys) : [];
  for(const t of pts){
    const h=Math.hypot(k.x-t.x,k.y-t.y)||1e-9;
    const nx=(k.x-t.x)/h, ny=(k.y-t.y)/h;
    if(h<WHEEL_RAD-INNER){ k.x+=nx*(WHEEL_RAD-INNER-h); k.y+=ny*(WHEEL_RAD-INNER-h); }
  }
  if(pts.length===2){
    const keep=(t1,t2)=>{
      const h=Math.hypot(k.x-t2.x,k.y-t2.y)||1e-9;
      const nx=(k.x-t2.x)/h, ny=(k.y-t2.y)/h;
      const [n90x,n90y]=rot90(nx,ny);
      const Mtm=M + h*(n90x*Fx+n90y*Fy);
      return ((t1.x-t2.x)*n90x+(t1.y-t2.y)*n90y)*Mtm >= 0;
    };
    if(!keep(pts[0],pts[1])) pts=[pts[1]];
    else if(!keep(pts[1],pts[0])) pts=[pts[0]];
  }
  const adjust=(t)=>{
    const h=Math.hypot(k.x-t.x,k.y-t.y)||1e-9;
    const nx=(k.x-t.x)/h, ny=(k.y-t.y)/h;
    if(nx*k.vx+ny*k.vy > -DETACH_V && nx*Fx+ny*Fy > 0) return false;
    const vn=nx*k.vx+ny*k.vy;
    k.vx-=nx*vn; k.vy-=ny*vn;
    return true;
  };
  if(pts.length===2 && !adjust(pts[1])) pts=[pts[0]];
  if(pts.length>=1 && !adjust(pts[0])) pts = pts.length===2?[pts[1]]:[];
  setContact(pts.length>0);

  if(pts.length===0){
    k.omega += (M/theta)*DT;
    k.alfa  += k.omega*DT;
    k.vx += (Fx/mass)*DT; k.vy += (Fy/mass)*DT;
    k.x += k.vx*DT; k.y += k.vy*DT;
    return;
  }
  if(pts.length===2){ k.vx=0;k.vy=0;k.omega=0; return; }
  const t=pts[0];
  const h=Math.hypot(k.x-t.x,k.y-t.y)||1e-9;
  const nx=(k.x-t.x)/h, ny=(k.y-t.y)/h;
  const [n90x,n90y]=rot90(nx,ny);
  k.omega=(k.vx*n90x+k.vy*n90y)/WHEEL_RAD;
  M += (Fx*n90x+Fy*n90y)*WHEEL_RAD;
  const thetaEff=theta+mass*h*h;
  k.omega += (M/thetaEff)*DT;
  k.alfa  += k.omega*DT;
  k.vx = k.omega*WHEEL_RAD*n90x;
  k.vy = k.omega*WHEEL_RAD*n90y;
  k.x += k.vx*DT; k.y += k.vy*DT;
}

/* ---------- erokszamitasa (LEPTET.CPP) ---------- */
function rodForces(b, wheel, kordx, kordy, Mwheel){
  const i1x=Math.cos(b.body.alfa), i1y=Math.sin(b.body.alfa);
  const [j1x,j1y]=rot90(i1x,i1y);
  const gsx=i1x*kordx+j1x*kordy;
  const gsy=i1y*kordx+j1y*kordy;
  const gax=gsx+b.body.x, gay=gsy+b.body.y;
  const gx=gax-wheel.x, gy=gay-wheel.y;
  let Fwx=0,Fwy=0,Fbx=0,Fby=0,Mb=0;
  if(Math.abs(gx)>1e-4||Math.abs(gy)>1e-4){
    const rl=Math.hypot(gsx,gsy)||1e-9;
    const rex=gsx/rl, rey=gsy/rl;
    const [rmx,rmy]=rot90(rex,rey);
    const Fs=(gx*rex+gy*rey)*DRSUGAR;
    const Ft=(gx*rmx+gy*rmy)*DRTANG;
    Fwx=Fs*rex+Ft*rmx; Fwy=Fs*rey+Ft*rmy;
    Fbx=-Fwx; Fby=-Fwy;
    Mb=-Ft*rl;
  }
  const kx=wheel.x-b.body.x, ky=wheel.y-b.body.y;
  const kl=Math.hypot(kx,ky)||1e-9;
  const kex=kx/kl, key=ky/kl;
  const [kmx,kmy]=rot90(kx,ky);
  const [kemx,kemy]=rot90(kex,key);
  const relvx=kmx*b.body.omega+b.body.vx-wheel.vx;
  const relvy=kmy*b.body.omega+b.body.vy-wheel.vy;
  const vlong=relvx*kex+relvy*key;
  const vtang=relvx*kemx+relvy*kemy;
  const Flx=vlong*SR*kex, Fly=vlong*SR*key;
  const Ftx=vtang*SR*kemx, Fty=vtang*SR*kemy;
  const Fnx=kemx*(Mwheel/kl), Fny=kemy*(Mwheel/kl);
  Fwx+=Flx+Ftx-Fnx; Fwy+=Fly+Fty-Fny;
  Mb += -(Ftx*kmx+Fty*kmy);
  Fbx+=-Flx-Ftx+Fnx; Fby+=-Fly-Fty+Fny;
  return {Fwx,Fwy,Fbx,Fby,Mb};
}

/* ---------- leptet (LEPTET.CPP) ---------- */
function leptet(b, now, gas, brake, volt1, volt2, polys, gx, gy){
  if(!b.voltfek && brake){ b.dfek2=b.w2.alfa-b.body.alfa; b.dfek4=b.w4.alfa-b.body.alfa; }
  b.voltfek=brake;
  let M2=0,M4=0;
  if(gas){
    if(b.dir===1){ if(b.w4.omega > -MAX_SPIN) M4=-GAS_TORQUE; }
    else         { if(b.w2.omega <  MAX_SPIN) M2= GAS_TORQUE; }
  }
  if(brake){
    let da=b.w2.alfa-(b.body.alfa+b.dfek2), dw=b.w2.omega-b.body.omega;
    M2=-BRAKE_K*da-BRAKE_C*dw;
    da=b.w4.alfa-(b.body.alfa+b.dfek4); dw=b.w4.omega-b.body.omega;
    M4=-BRAKE_K*da-BRAKE_C*dw;
  } else {
    const wrap=k=>{ if(k.alfa<-Math.PI)k.alfa+=2*Math.PI; if(k.alfa>Math.PI)k.alfa-=2*Math.PI; };
    wrap(b.w2); wrap(b.w4);
  }
  const f2=rodForces(b,b.w2,-ANCH_X,ANCH_Y,M2);
  const f4=rodForces(b,b.w4, ANCH_X,ANCH_Y,M4);

  if(b.jump1 && (volt1||volt2||now>b.jump1t+VOLT_HOLD*0.25)){
    b.body.omega+=VOLT_IMP;
    if(b.body.omega>b.om1) b.body.omega=b.om1;
    if(b.body.omega>0){ b.body.omega-=VOLT_RETURN; if(b.body.omega<0)b.body.omega=0; }
    b.jump1=false;
  }
  if(b.jump2 && (volt1||volt2||now>b.jump2t+VOLT_HOLD*0.25)){
    b.body.omega-=VOLT_IMP;
    if(b.body.omega<b.om2) b.body.omega=b.om2;
    if(b.body.omega<0){ b.body.omega+=VOLT_RETURN; if(b.body.omega>0)b.body.omega=0; }
    b.jump2=false;
  }
  if(volt1){ b.jump1=true; b.om1=b.body.omega; b.jump1t=now; b.body.omega-=VOLT_IMP; }
  if(volt2){ b.jump2=true; b.om2=b.body.omega; b.jump2t=now; b.body.omega+=VOLT_IMP; }

  beallit(b.body, f2.Fbx+f4.Fbx+BODY_M*gx, f2.Fby+f4.Fby+BODY_M*gy, f2.Mb+f4.Mb,
          BODY_M, BODY_TH, false, polys, ()=>{});
  beallit(b.w2, f2.Fwx+WHEEL_M*gx, f2.Fwy+WHEEL_M*gy, M2, WHEEL_M, WHEEL_TH, true, polys, c=>b.w2c=c);
  beallit(b.w4, f4.Fwx+WHEEL_M*gx, f4.Fwy+WHEEL_M*gy, M4, WHEEL_M, WHEEL_TH, true, polys, c=>b.w4c=c);
}

function headPos(b){
  const a=b.body.alfa+Math.PI/2-(HEAD_BACK*b.dir);
  return {x:b.body.x+HEAD_DIST*Math.cos(a), y:b.body.y+HEAD_DIST*Math.sin(a)};
}



/* ---------- .LEV-tuki (Elma POT14; formaatti dokumentoitu MIT-lisensoidussa
   elmajs-kirjastossa, github.com/elmadev/elmajs) ---------- */
function parseLev(buf){
  const dv=new DataView(buf);
  const magic=String.fromCharCode(...new Uint8Array(buf,0,5));
  if(magic==='POT06') return parseAcross(dv,buf);
  if(magic!=='POT14') throw new Error('Ei kelvollinen kenttä (POT14/POT06 puuttuu)');
  let o=7+4+32; // magic+2, link u32, integrity 4*f64
  const name=String.fromCharCode(...new Uint8Array(buf,o,51)).split('\0')[0]; o+=51;
  o+=16+10+10; // lgr, ground, sky
  const polyCount=Math.round(dv.getFloat64(o,true)-0.4643643); o+=8;
  const polys=[], grass=[];
  for(let i=0;i<polyCount;i++){
    const g=dv.getInt32(o,true); o+=4;
    const n=dv.getInt32(o,true); o+=4;
    const pts=[];
    for(let j=0;j<n;j++){
      const x=dv.getFloat64(o,true); o+=8;
      const y=dv.getFloat64(o,true); o+=8;
      pts.push([x,-y]); // lev: y kasvaa alas -> fysiikassa ylös
    }
    (g?grass:polys).push(pts);
  }
  const objCount=Math.round(dv.getFloat64(o,true)-0.4643643); o+=8;
  const apples=[],flowers=[],killers=[]; let start=null; let gravApples=0;
  for(let i=0;i<objCount;i++){
    const x=dv.getFloat64(o,true), y=-dv.getFloat64(o+8,true);
    const type=dv.getInt32(o+16,true), grav=dv.getInt32(o+20,true);
    o+=28;
    if(type===2){ apples.push({x,y,taken:false,grav}); if(grav>0) gravApples++; }
    else if(type===1) flowers.push({x,y});
    else if(type===3) killers.push({x,y});
    else if(type===4) start={x,y};
  }
  if(!start) throw new Error('Kentästä puuttuu aloituspaikka');
  if(!flowers.length) throw new Error('Kentästä puuttuu kukka');
  let minX=1/0,maxX=-1/0,minY=1/0,maxY=-1/0;
  for(const p of polys) for(const [x,y] of p){
    if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
  }
  return {name:name||'nimetön', start, apples, flowers, killers,
          polys, grassPolys:grass, inverted:true,
          bounds:{minX,maxX,minY,maxY}, gravApples};
}
/* Across POT06 (rakenne TOPOL.CPP:stä): otsake, nimi[15], hyppy tavuun 100,
   f64 polymäärä, polygonit {i32 n, n*(f64,f64)}, f64 objektimäärä,
   objektit {f64 x, f64 y, i32 tyyppi}. Koordinaatit valmiiksi y-ylös. */
function parseAcross(dv,buf){
  const name=String.fromCharCode(...new Uint8Array(buf,41,15)).split('\0')[0];
  let o=100;
  const pc=Math.trunc(dv.getFloat64(o,true)); o+=8;
  if(pc<=0||pc>1000) throw new Error('POT06: epäkelpo polygonimäärä');
  const polys=[];
  for(let i=0;i<pc;i++){
    const n=dv.getInt32(o,true); o+=4;
    if(n<3||n>10000) throw new Error('POT06: epäkelpo pistemäärä');
    const pts=[];
    for(let j=0;j<n;j++){ pts.push([dv.getFloat64(o,true),dv.getFloat64(o+8,true)]); o+=16; }
    polys.push(pts);
  }
  const oc=Math.trunc(dv.getFloat64(o,true)); o+=8;
  const apples=[],flowers=[],killers=[]; let start=null;
  for(let i=0;i<oc;i++){
    const x=dv.getFloat64(o,true), y=dv.getFloat64(o+8,true);
    const t=dv.getInt32(o+16,true); o+=20;
    if(t===2) apples.push({x,y,taken:false,grav:0});
    else if(t===1) flowers.push({x,y});
    else if(t===3) killers.push({x,y});
    else if(t===4) start={x,y};
  }
  if(!start) throw new Error('POT06: aloituspaikka puuttuu');
  if(!flowers.length) throw new Error('POT06: kukka puuttuu');
  let minX=1/0,maxX=-1/0,minY=1/0,maxY=-1/0;
  for(const pl of polys) for(const [x,y] of pl){
    if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
  }
  return {name:name||'nimetön (Across)', start, apples, flowers, killers,
          polys, grassPolys:[], inverted:true,
          bounds:{minX,maxX,minY,maxY}, gravApples:0};
}

  demoStr:null, demoF:0,
  get demoActive(){ return this.demoStr!==null; },
  startDemo(){
    if(this.custom || !DEMOS[this.levelIdx]) return false;
    const i=this.levelIdx;
    this.load(i);
    this.demoStr=DEMOS[i]; this.demoF=0;
    return true;
  },
  stopDemo(){ this.demoStr=null; },
  demoInput(){
    if(this.demoF>=this.demoStr.length || this.state!=='play'){ this.stopDemo(); return null; }
    const c=this.demoStr.charCodeAt(this.demoF++)-48;
    if(c&16) this.flip();
    return {gas:!!(c&1),brake:!!(c&2),voltL:!!(c&4),voltR:!!(c&8)};
  },
  load(i){
    this.demoStr=null;
    this.levelIdx=i; this.custom=null;
    this.level=toUnits(LEVELS_PX[i]);
    this.got=0; this.time=0; this.simT=0;
    this.bike=makeBike(this.level.start.x,this.level.start.y);
    this.cam.x=this.level.start.x; this.cam.y=this.level.start.y;
    this.grav={x:0,y:-1};
    this.state='play';
  },
  loadCustom(lev){
    this.custom=lev;
    this.level={...lev, apples:lev.apples.map(a=>({...a,taken:false}))};
    this.got=0; this.time=0; this.simT=0;
    this.bike=makeBike(lev.start.x,lev.start.y);
    this.cam.x=lev.start.x; this.cam.y=lev.start.y;
    this.grav={x:0,y:-1};
    this.state='play';
  },
  flip(){ if(this.state==='play') this.bike.dir*=-1; },
  confirm(){
    if(this.state==='intro') this.load(0);
    else if(this.state==='dead'){
      if(this.custom) this.loadCustom(this.custom); else this.load(this.levelIdx);
    }
    else if(this.state==='finish'){
      if(this.custom){ this.custom=null; this.load(0); }
      else if(this.levelIdx+1<LEVELS_PX.length) this.load(this.levelIdx+1);
      else this.state='allDone';
    }
    else if(this.state==='allDone'){ this.deaths=0; this.load(0); }
  },
  die(){ if(this.state!=='play')return; this.state='dead'; this.deaths++; this.bike.dead=true; },
  best:{},
  win(){ if(this.state!=='play')return; this.state='finish';
    if(!this.custom && !this.demoActive){
      const t=this.simT;
      if(this.best[this.levelIdx]===undefined || t<this.best[this.levelIdx])
        this.best[this.levelIdx]=t;
    }
  },

  /* Yksi ruudun verran fysiikkaa (STEPS_PER_FRAME askelta) */
  stepFrame(inp){ // inp: {gas,brake,voltL,voltR}
    if(this.state!=='play') return;
    const b=this.bike, polys=this.level.polys;
    for(let s=0;s<STEPS_PER_FRAME;s++){
      if(this.state!=='play') break;
      let v1=false,v2=false;
      // oikea = myötäpäivään ruudulla = omega miinus (y ylös) = volt "jump1"
      if(inp.voltR && this.simT-b.lastVolt>=VOLT_HOLD){ v1=true; b.lastVolt=this.simT; }
      else if(inp.voltL && this.simT-b.lastVolt>=VOLT_HOLD){ v2=true; b.lastVolt=this.simT; }
      leptet(b, this.simT, inp.gas, inp.brake, v1, v2, polys, this.grav.x*G_ACC, this.grav.y*G_ACC);
      this.simT+=DT;
      // kuolema: pää osuu maahan
      const hp=headPos(b);
      if(findContacts(hp.x,hp.y,HEAD_R,polys).length>0){ this.die(); break; }
      if(this.level.bounds){
        const B=this.level.bounds;
        if(b.body.x<B.minX-30||b.body.x>B.maxX+30||b.body.y<B.minY-30||b.body.y>B.maxY+30){ this.die(); break; }
      } else if(b.body.y < -70){ this.die(); break; }
      let killed=false;
      for(const kl of this.level.killers){
        if(Math.hypot(b.w2.x-kl.x,b.w2.y-kl.y)<WHEEL_RAD+PICK_R ||
           Math.hypot(b.w4.x-kl.x,b.w4.y-kl.y)<WHEEL_RAD+PICK_R ||
           Math.hypot(hp.x-kl.x,hp.y-kl.y)<HEAD_R+PICK_R){ killed=true; break; }
      }
      if(killed){ this.die(); break; }
      // omenat & kukka
      for(const a of this.level.apples){
        if(a.taken) continue;
        if(Math.hypot(b.w2.x-a.x,b.w2.y-a.y)<WHEEL_RAD+PICK_R ||
           Math.hypot(b.w4.x-a.x,b.w4.y-a.y)<WHEEL_RAD+PICK_R ||
           Math.hypot(hp.x-a.x,hp.y-a.y)<HEAD_R+PICK_R){
          a.taken=true; this.got++;
          if(a.grav){ // painovoimaomena: 1=ylös 2=alas 3=vasen 4=oikea
            this.grav=[null,{x:0,y:1},{x:0,y:-1},{x:-1,y:0},{x:1,y:0}][a.grav];
          }
        }
      }
      if(this.got===this.level.apples.length){
        for(const f of this.level.flowers){
          if(Math.hypot(b.w2.x-f.x,b.w2.y-f.y)<WHEEL_RAD+PICK_R ||
             Math.hypot(b.w4.x-f.x,b.w4.y-f.y)<WHEEL_RAD+PICK_R ||
             Math.hypot(hp.x-f.x,hp.y-f.y)<HEAD_R+PICK_R){ this.win(); break; }
        }
        if(this.state!=='play') break;
      }
    }
    this.time++;
  }
};

/* ---------- Syöte ---------- */
const keys = {};
let menuOpen=false;   // ylätasolla: myös piirtosilmukka (script1) lukee tätä
if(typeof window!=='undefined'){
const lvlMenu=document.getElementById('lvlMenu');
const lvlList=document.getElementById('lvlList');
function fmtT(t){ return t===undefined?'—':t.toFixed(1)+'s'; }
function renderLvlMenu(){
  lvlList.innerHTML='';
  LEVELS_PX.forEach((L,i)=>{
    const row=document.createElement('div');
    row.className='lvlRow';
    row.innerHTML=`<span>${i+1}. ${L.name}</span><span class="bt">paras ${fmtT(game.best[i])}</span>`;
    row.addEventListener('pointerdown',e=>{e.stopPropagation(); pickLevel(i);});
    lvlList.appendChild(row);
  });
}
function pickLevel(i){ closeMenu(); game.deaths=0; game.load(i); }
function openMenu(){ menuOpen=true; renderLvlMenu(); lvlMenu.classList.add('open'); }
function closeMenu(){ menuOpen=false; lvlMenu.classList.remove('open'); }
function toggleMenu(){ menuOpen?closeMenu():openMenu(); }
lvlMenu.addEventListener('pointerdown',e=>{ if(e.target===lvlMenu) closeMenu(); });
document.getElementById('menuBtn').addEventListener('pointerdown',e=>{e.stopPropagation(); toggleMenu();});
window.addEventListener('keydown',e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  if(e.key==='k'||e.key==='K'||(menuOpen&&e.key==='Escape')){ toggleMenu(); return; }
  if(menuOpen){
    const n=e.key==='0'?10:+e.key;
    if(n>=1&&n<=LEVELS_PX.length) pickLevel(n-1);
    return;
  }
  if(e.key==='m'||e.key==='M'){ game.demoActive?game.stopDemo():game.startDemo(); return; }
  if(game.demoActive){ game.stopDemo(); return; }
  keys[e.key]=true;
  if(e.key===' ' && !e.repeat) game.flip();
  if(e.key==='Enter'||e.key==='r'||e.key==='R') game.confirm();
  if(e.key==='s'||e.key==='S') game.cycleSkin();
  if(e.key>='1'&&e.key<='5') game.skin=(+e.key)-1;
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });
document.querySelectorAll('.tbtn').forEach(btn=>{
  const k=btn.dataset.k;
  const on=e=>{e.preventDefault(); if(game.demoActive){ game.stopDemo(); return; }
    if(k===' ') game.flip(); else keys[k]=true;
    if(game.state!=='play') game.confirm(); };
  const off=e=>{e.preventDefault(); keys[k]=false;};
  btn.addEventListener('pointerdown',on);
  btn.addEventListener('pointerup',off);
  btn.addEventListener('pointercancel',off);
  btn.addEventListener('pointerleave',off);
});
}
</script>
<script>
"use strict";
/* ---------- Piirto ---------- */
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize); resize();
cv.addEventListener('pointerdown',()=>{ if(game.state!=='play') game.confirm(); });
const skinBtn=document.getElementById('skinBtn');
skinBtn.addEventListener('pointerdown',e=>{e.stopPropagation(); game.cycleSkin();});
function updateSkinBtn(){ skinBtn.textContent='PYÖRÄ: '+SKINS[game.skin].name+' ▸'; }
/* .lev-lataus: nappi + raahaus */
const levBtn=document.getElementById('levBtn');
const levFile=document.getElementById('levFile');
levBtn.addEventListener('pointerdown',e=>{e.stopPropagation(); levFile.click();});
levFile.addEventListener('change',e=>{ if(e.target.files[0]) readLev(e.target.files[0]); e.target.value=''; });
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('drop',e=>{
  e.preventDefault();
  const f=[...e.dataTransfer.files].find(f=>f.name.toLowerCase().endsWith('.lev'));
  if(f) readLev(f);
});
function readLev(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const lev=parseLev(r.result);
      game.loadCustom(lev);
      if(lev.gravApples>0) console.warn('Huom: painovoimaomenat pelataan tavallisina');
    }catch(err){
      alert('LEV-virhe: '+err.message);
    }
  };
  r.readAsArrayBuffer(file);
}

const SX=x=>(x-game.cam.x)*SCALE+W/2;
const SY=y=>(game.cam.y-y)*SCALE+H/2;

function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
let _pat=null;
function groundPattern(){
  if(_pat) return _pat;
  const pc=document.createElement('canvas'); pc.width=pc.height=48;
  const p=pc.getContext('2d');
  p.fillStyle=getCss('--ground'); p.fillRect(0,0,48,48);
  for(let i=0;i<70;i++){
    const s=Math.random()*3+1;
    p.fillStyle=Math.random()<0.5?'rgba(255,255,255,.05)':'rgba(0,0,0,.18)';
    p.fillRect(Math.random()*48,Math.random()*48,s,s);
  }
  p.strokeStyle='rgba(0,0,0,.12)'; p.lineWidth=2;
  for(let i=-48;i<96;i+=12){ p.beginPath(); p.moveTo(i,0); p.lineTo(i+48,48); p.stroke(); }
  _pat=ctx.createPattern(pc,'repeat');
  return _pat;
}

function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,getCss('--sky1')); g.addColorStop(1,getCss('--sky2'));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const L=game.level;
  if(!L) return;
  const b=game.bike;
  game.cam.x+=(b.body.x-game.cam.x)*0.12;
  game.cam.y+=(b.body.y+1.2-game.cam.y)*0.12;

  ctx.fillStyle='rgba(255,240,180,.9)';
  ctx.beginPath(); ctx.arc(W*0.78,H*0.16,42,0,7); ctx.fill();

  if(L.inverted){
    // Elma-kenttä: maa on kaikkialla PAITSI polygonien sisällä (even-odd)
    ctx.beginPath();
    ctx.rect(-10,-10,W+20,H+20);
    for(const poly of L.polys){
      ctx.moveTo(SX(poly[0][0]),SY(poly[0][1]));
      for(let i=1;i<poly.length;i++) ctx.lineTo(SX(poly[i][0]),SY(poly[i][1]));
      ctx.closePath();
    }
    ctx.fillStyle=groundPattern(); ctx.fill('evenodd');
    for(const poly of L.polys){
      ctx.beginPath();
      ctx.moveTo(SX(poly[0][0]),SY(poly[0][1]));
      for(let i=1;i<poly.length;i++) ctx.lineTo(SX(poly[i][0]),SY(poly[i][1]));
      ctx.closePath();
      ctx.lineWidth=3; ctx.strokeStyle=getCss('--grass'); ctx.stroke();
      ctx.lineWidth=1.5; ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.stroke();
    }
  } else {
    for(const poly of L.polys){
      ctx.beginPath();
      ctx.moveTo(SX(poly[0][0]),SY(poly[0][1]));
      for(let i=1;i<poly.length;i++) ctx.lineTo(SX(poly[i][0]),SY(poly[i][1]));
      ctx.closePath();
      ctx.fillStyle=groundPattern(); ctx.fill();
      ctx.lineWidth=6; ctx.strokeStyle=getCss('--grass'); ctx.stroke();
      ctx.lineWidth=2; ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.stroke();
    }
  }
  // killerit (piikkirattaat)
  for(const kl of L.killers){
    const x=SX(kl.x), y=SY(kl.y), r=PICK_R*SCALE*0.8;
    ctx.save(); ctx.translate(x,y); ctx.rotate(game.time*0.05);
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const a1=i/8*Math.PI*2, a2=a1+Math.PI/8;
      ctx.lineTo(Math.cos(a1)*(r+5),Math.sin(a1)*(r+5));
      ctx.lineTo(Math.cos(a2)*r*0.6,Math.sin(a2)*r*0.6);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(0,0,r*0.4,0,7); ctx.fill();
    ctx.restore();
  }
  for(const a of L.apples){
    if(a.taken) continue;
    const x=SX(a.x), y=SY(a.y);
    ctx.fillStyle='#c8401e';
    ctx.beginPath(); ctx.arc(x,y,PICK_R*SCALE*0.75,0,7); ctx.fill();
    ctx.strokeStyle='#7a1f0c'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='#2f6b2a'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x,y-9); ctx.quadraticCurveTo(x+5,y-16,x+8,y-14); ctx.stroke();
  }
  for(const f of L.flowers){
    const x=SX(f.x), y=SY(f.y);
    const ready=game.got===L.apples.length;
    ctx.save(); ctx.translate(x,y);
    ctx.strokeStyle='#2f6b2a'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(0,14); ctx.lineTo(0,-2); ctx.stroke();
    for(let i=0;i<6;i++){
      const an=i/6*Math.PI*2+game.time*0.02;
      ctx.fillStyle=ready?'#fff':'rgba(255,255,255,.45)';
      ctx.beginPath(); ctx.arc(Math.cos(an)*10,-8+Math.sin(an)*10,7,0,7); ctx.fill();
    }
    ctx.fillStyle=ready?'#e8b93a':'rgba(232,185,58,.5)';
    ctx.beginPath(); ctx.arc(0,-8,6,0,7); ctx.fill();
    ctx.restore();
  }
  drawBike(b);
  const t=game.simT;
  hud.innerHTML=
    (game.custom ? `LEV: ${L.name}<br>` : `KENTTÄ ${game.levelIdx+1}/${LEVELS_PX.length}: ${L.name}<br>`)+
    `AIKA ${t.toFixed(2)} &nbsp; OMENAT ${game.got}/${L.apples.length} &nbsp; KUOLEMAT ${game.deaths}`;
}

function drawShock(x1,y1,x2,y2,coils){
  const dx=x2-x1, dy=y2-y1, d=Math.hypot(dx,dy)||1;
  const px=-dy/d, py=dx/d;
  ctx.strokeStyle='#8a8a8a'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(x1,y1);
  for(let i=1;i<coils*2;i++){
    const t=i/(coils*2), off=(i%2?3.5:-3.5);
    ctx.lineTo(x1+dx*t+px*off, y1+dy*t+py*off);
  }
  ctx.lineTo(x2,y2); ctx.stroke();
}

function drawBike(b){
  const K=SKINS[game.skin];
  const ca=Math.cos(b.body.alfa), sa=Math.sin(b.body.alfa);
  const d=b.dir;
  const P=(lx,ly)=>[ SX(b.body.x + ca*lx*d - sa*ly), SY(b.body.y + sa*lx*d + ca*ly) ];
  const line=(pts,w,c)=>{ ctx.strokeStyle=c; ctx.lineWidth=w; ctx.lineCap='round';
    ctx.lineJoin='round'; ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]); ctx.stroke(); };
  const fill=(pts,c)=>{ ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]); ctx.closePath(); ctx.fill(); };

  const rear = d===1 ? b.w2 : b.w4;
  const front= d===1 ? b.w4 : b.w2;
  const RW=[SX(rear.x),SY(rear.y)], FW=[SX(front.x),SY(front.y)];

  /* --- pyörät --- */
  for(const w of [b.w2,b.w4]){
    const x=SX(w.x), y=SY(w.y), r=WHEEL_RAD*SCALE;
    ctx.strokeStyle=K.tire; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(x,y,r-2,0,7); ctx.stroke();
    ctx.strokeStyle=K.rim; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(x,y,r-5,0,7); ctx.stroke();
    ctx.strokeStyle=K.spokeC; ctx.lineWidth=K.spokeW;
    for(let s=0;s<K.spokeN;s++){
      const an=-w.alfa+s*Math.PI*2/K.spokeN;
      ctx.beginPath(); ctx.moveTo(x,y);
      ctx.lineTo(x+Math.cos(an)*(r-5), y+Math.sin(an)*(r-5)); ctx.stroke();
    }
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill();
  }

  /* --- takakeinu + iskunvaimennin --- */
  const swiv=P(-0.30,-0.42);
  line([swiv,RW],5,'#3a3a3a');
  line([swiv,RW],2,'#6a6a6a');
  drawShock(...P(-0.18,0.02), RW[0],RW[1], 4);

  /* --- etuhaarukka --- */
  const forkTop=P(0.52,0.02);
  {
    const dx=FW[0]-forkTop[0], dy=FW[1]-forkTop[1], l=Math.hypot(dx,dy)||1;
    const ox=-dy/l*2.4, oy=dx/l*2.4;
    line([[forkTop[0]+ox,forkTop[1]+oy],[FW[0]+ox,FW[1]+oy]],3,K.fork);
    line([[forkTop[0]-ox,forkTop[1]-oy],[FW[0]-ox,FW[1]-oy]],3,K.fork);
  }

  /* --- etulokasuoja --- */
  {
    const r=WHEEL_RAD*SCALE+4;
    const fx=FW[0],fy=FW[1];
    ctx.strokeStyle=b.dead?'#7a1f0c':K.fender; ctx.lineWidth=4; ctx.lineCap='round';
    const a0=Math.atan2((P(0.52,0.3)[1]-fy),(P(0.52,0.3)[0]-fx));
    ctx.beginPath(); ctx.arc(fx,fy,r,a0-0.85,a0+0.85); ctx.stroke();
  }

  /* --- runko, moottori, pakoputki, tankki, satula --- */
  line([P(-0.42,-0.05),P(-0.05,-0.32)],4,K.frame);
  line([P(-0.05,-0.32),P(0.45,-0.02)],4,K.frame);
  fill([P(-0.12,-0.10),P(0.16,-0.10),P(0.16,-0.34),P(-0.12,-0.34)],K.engine);
  fill([P(-0.09,-0.13),P(0.13,-0.13),P(0.13,-0.20),P(-0.09,-0.20)],'#6b6b6b');
  line([P(0.10,-0.30),P(-0.30,-0.42),P(-0.72,-0.36)],5,K.exhaust);
  ctx.fillStyle=K.exhaust; ctx.beginPath();
  { const[ex,ey]=P(-0.78,-0.35); ctx.arc(ex,ey,4,0,7); ctx.fill(); }
  fill([P(-0.02,0.04),P(0.42,0.10),P(0.50,0.22),P(0.28,0.30),P(-0.05,0.20)],
       b.dead?'#7a1f0c':K.tank);
  line([P(0.06,0.22),P(0.30,0.26)],2,K.tankHi);
  fill([P(-0.48,0.16),P(-0.02,0.20),P(-0.04,0.30),P(-0.44,0.27)],'#1c1a17');

  /* --- numerokilpi keulassa --- */
  {
    const [px,py]=P(0.64,0.30);
    ctx.fillStyle='#f5f2ea';
    ctx.beginPath(); ctx.arc(px,py,6,0,7); ctx.fill();
    ctx.strokeStyle='#1c1a17'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#1c1a17'; ctx.font='bold 8px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(K.plate,px,py+0.5);
  }

  /* --- ohjaustanko --- */
  const barTop=P(0.60,0.50), grip=P(0.52,0.47);
  line([forkTop,barTop],3.5,K.frame);
  line([barTop,P(0.70,0.46)],3.5,K.frame);
  line([P(0.70,0.46),P(0.72,0.45)],5,'#111');

  /* --- kuljettaja --- */
  const hip=P(-0.26,0.30), knee=P(0.18,0.10), peg=P(0.02,-0.30);
  const shoulder=P(0.02,0.78);
  const hp=headPos(b), HX=SX(hp.x), HY=SY(hp.y);
  line([P(-0.24,0.28),P(0.14,0.09),P(0.00,-0.28)],5,K.suitBack);
  line([hip,P(-0.14,0.55),shoulder],6,K.suitTop);
  line([hip,knee,peg],5,K.suitLeg);
  ctx.fillStyle='#111'; ctx.beginPath();
  ctx.arc(peg[0]+1,peg[1]+1,3,0,7); ctx.fill();
  const elbow=P(0.30,0.58);
  line([shoulder,elbow,grip],4.5,K.suitTop);
  ctx.fillStyle=K.glove; ctx.beginPath();
  ctx.arc(grip[0],grip[1],2.5,0,7); ctx.fill();
  line([shoulder,[HX,HY]],3.5,K.glove);

  /* --- kypärä fyysisessä pään pisteessä --- */
  const hr=HEAD_R*SCALE+1.5;
  ctx.fillStyle=b.dead?'#666':K.helmet;
  ctx.beginPath(); ctx.arc(HX,HY,hr,0,7); ctx.fill();
  ctx.strokeStyle='#1c1a17'; ctx.lineWidth=2; ctx.stroke();
  const va=Math.atan2(-(sa*d),(ca));
  if(K.visor){
    ctx.fillStyle=K.visor;
    ctx.beginPath();
    ctx.arc(HX,HY,hr-1.5, va-0.55, va+0.55);
    ctx.arc(HX,HY,hr-5.5, va+0.55, va-0.55,true);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(HX,HY,hr-3, va-0.4, va-0.05); ctx.stroke();
  } else {
    // avokypärä + valkoparta (retro)
    ctx.fillStyle='#e8c8a0';   // kasvot
    ctx.beginPath();
    ctx.arc(HX+Math.cos(va)*2.5, HY+Math.sin(va)*2.5, hr-4.5, va-0.7, va+0.7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#f2efe6';   // parta
    ctx.beginPath();
    ctx.arc(HX+Math.cos(va)*4, HY+Math.sin(va)*4+4, 4.5, 0, 7);
    ctx.fill();
  }
}

    `<h1>ELASTO-MANIA*</h1>

     julkaistusta lähdekoodista (CC BY-NC-SA 4.0, ei-kaupallinen)</p>

     Jos kypärä osuu maahan, käy huonosti.</p>
     <p style="margin-top:8px">&#9650; kaasu &nbsp; &#9660; jarru &nbsp; &#9664;/&#9654; voltti (impulssi!)<br>
     VÄLILYÖNTI kääntää ajosuunnan<br>S tai 1&ndash;5 vaihtaa pyörän ulkoasun<br>K avaa kenttävalikon &middot; M näyttää mallisuorituksen<br>+LEV-nappi tai raahaus lataa .lev-kentän (Elma &amp; Across)</p>
     <span class="go">Paina ENTER tai kosketa ruutua</span>`;
  else if(s==='dead') msgCard.innerHTML=
    `<h1>KOLARI!</h1><p>Kypärä kärsi kolauksen.</p>
     <span class="go">ENTER / kosketus = uudestaan</span>`;

     <span class="go">ENTER / kosketus = seuraava kenttä</span>`;

    `<h1>KAIKKI KENTÄT LÄPI!</h1><p>Kuolemia yhteensä: ${game.deaths}</p>
     <span class="go">ENTER / kosketus = alusta</span>`;
}

const demoBadge=document.getElementById('demoBadge');
document.getElementById('demoBtn').addEventListener('pointerdown',e=>{
  e.stopPropagation();
  game.demoActive?game.stopDemo():game.startDemo();
});
function tick(){
  if(menuOpen){ draw(); requestAnimationFrame(tick); return; }
  let inp=null;
  if(game.demoActive) inp=game.demoInput();
  if(!inp) inp={
    gas:!!keys['ArrowUp'], brake:!!keys['ArrowDown'],
    voltL:!!keys['ArrowLeft'], voltR:!!keys['ArrowRight']
  };
  demoBadge.classList.toggle('on', game.demoActive);
  game.stepFrame(inp);
  draw();
  updateMsg();
  updateSkinBtn();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
